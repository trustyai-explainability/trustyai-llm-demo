---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: lingua-detector
  labels:
    app: lingua-detector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lingua-detector
  template:
    metadata:
      labels:
        app: lingua-detector
    spec:
      containers:
        - name: lingua-detector
          image: 'quay.io/ckavili/lingua-language-detector:0.0.25'
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: INFO
          resources:
            limits:
              cpu: '2'
              memory: 3Gi
            requests:
              cpu: '1'
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
kind: Service
apiVersion: v1
metadata:
  name: lingua-detector
  labels:
    app: lingua-detector
spec:
  selector:
    app: lingua-detector
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
