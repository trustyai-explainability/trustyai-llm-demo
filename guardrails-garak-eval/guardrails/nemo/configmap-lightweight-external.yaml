apiVersion: v1
kind: ConfigMap
metadata:
  name: config-lightweight-external
data:
  config.yaml: |
    models:
      - type: main
        engine: openai
        parameters:
          openai_api_base: ${LLM_API_BASE}
          model_name: ${LLM_MODEL_NAME}
          api_key: ${LLM_API_KEY}

    tracing:
      enabled: true
      span_format: opentelemetry
      enable_content_capture: true
      adapters:
        - name: OpenTelemetry
          
    rails:
      input:
        flows:
          - check hap
          - check language
          - check prompt injection

  rails.co: |
    define flow check prompt injection
      $result = execute check_prompt_injection
      if $result != "allowed"
        bot inform injection detected
        stop

    define bot inform injection detected
      "🛡️ Prompt injection detected. I cannot process this request."

    define flow check hap
      $result = execute check_hap
      if $result != "allowed"
        bot inform hap detected
        stop

    define bot inform hap detected
      "🚫 Inappropriate content detected. Please keep your messages respectful."

    define flow check language
      $result = execute check_language
      if $result != "allowed"
        bot inform non english
        stop

    define bot inform non english
      "🌐 Please use English only. I can only respond to questions in English."

    define flow check hap output
      $result = execute check_hap_output
      if $result != "allowed"
        bot inform hap detected output
        stop

    define bot inform hap detected output
      "🚫 Response blocked. The generated content was flagged as inappropriate."

  actions.py: |
    import os
    from typing import Optional
    from nemoguardrails.actions import action

    DETECTOR_PROMPT_URL = os.getenv(
        "DETECTOR_PROMPT_URL",
        "http://detector-prompt-predictor:8000/api/v1/text/contents"
    )
    DETECTOR_HAP_URL = os.getenv(
        "DETECTOR_HAP_URL",
        "http://detector-hap-predictor:8000/api/v1/text/contents"
    )
    LINGUA_DETECTOR_URL = os.getenv(
        "LINGUA_DETECTOR_URL",
        "http://lingua-detector:8080/api/v1/text/contents"
    )

    async def _call_detector(url: str, text: str, threshold: float = 0.5) -> str:
        import aiohttp
        try:
            async with aiohttp.ClientSession() as session:
                async with session.post(
                    url,
                    json={"contents": [text], "detector_params": {}},
                    timeout=aiohttp.ClientTimeout(total=5)
                ) as response:
                    if response.status == 200:
                        result = await response.json()
                        if result and len(result) > 0 and len(result[0]) > 0:
                            detection = result[0][0]
                            if detection.get("score", 0) >= threshold:
                                return "blocked"
                    return "allowed"
        except Exception as e:
            print(f"Detector error ({url}): {e}")
            return "allowed"

    @action(is_system_action=True)
    async def check_prompt_injection(context: Optional[dict] = None) -> str:
        user_message = context.get("user_message", "")
        return await _call_detector(DETECTOR_PROMPT_URL, user_message, threshold=0.5)

    @action(is_system_action=True)
    async def check_hap(context: Optional[dict] = None) -> str:
        user_message = context.get("user_message", "")
        return await _call_detector(DETECTOR_HAP_URL, user_message, threshold=0.5)

    @action(is_system_action=True)
    async def check_hap_output(context: Optional[dict] = None) -> str:
        bot_message = context.get("bot_message", "")
        return await _call_detector(DETECTOR_HAP_URL, bot_message, threshold=0.5)

    @action(is_system_action=True)
    async def check_language(context: Optional[dict] = None) -> str:
        import aiohttp
        user_message = context.get("user_message", "")
        try:
            async with aiohttp.ClientSession() as session:
                async with session.post(
                    LINGUA_DETECTOR_URL,
                    json={"contents": [user_message]},
                    timeout=aiohttp.ClientTimeout(total=5)
                ) as response:
                    if response.status == 200:
                        result = await response.json()
                        if result and len(result) > 0:
                            if len(result[0]) == 0:
                                return "allowed"
                            detection = result[0][0]
                            if detection.get("detection") == "non_english" and detection.get("score", 0) >= 0.85:
                                return "blocked"
                    return "allowed"
        except Exception as e:
            print(f"Language detection error: {e}")
            return "allowed"