apiVersion: v1
kind: Secret
metadata:
  name: llm-secret
type: Opaque
stringData:
  api-base: "${LLM_API_BASE}"
  model-name: "${LLM_MODEL_NAME}"
  api-key: "${LLM_API_KEY}"
  tempo-endpoint: "${TEMPO_ENDPOINT}"
  guard-api-base: "${GUARD_API_BASE}"
  guard-model-name: "${GUARD_MODEL_NAME}"
  guard-api-key: "${GUARD_API_KEY}"
