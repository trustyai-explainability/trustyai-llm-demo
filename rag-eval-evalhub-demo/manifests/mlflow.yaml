# MLflow tracking server for experiment tracking (optional but recommended).
#
# When EvalHub knows about an MLflow server (MLFLOW_TRACKING_URI env on the
# EvalHub CR, see evalhub.yaml), evaluation jobs that carry an `experiment`
# config log their metrics and per-row results as an MLflow run, giving you
# scoring history across runs for free.
#
# This is a demo-grade deployment (sqlite + emptyDir: runs are lost if the pod
# restarts). For production, use a persistent backend store or an existing
# MLflow instance.
#
# Apply with:
#   oc apply -n evalhub -f mlflow.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.22.0
          command: ["mlflow", "server", "--host", "0.0.0.0", "--port", "5000",
                    "--backend-store-uri", "sqlite:////tmp/mlflow.db",
                    "--artifacts-destination", "/tmp/mlartifacts"]
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
spec:
  selector:
    app: mlflow
  ports:
    - name: http
      port: 5000
      targetPort: 5000
---
# External route for the MLflow UI and for pulling results from notebooks.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: mlflow
spec:
  to:
    kind: Service
    name: mlflow
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
