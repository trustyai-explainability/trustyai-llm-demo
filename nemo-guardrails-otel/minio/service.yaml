apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: trustyai-guardrails
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: minio-tls
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  type: ClusterIP
